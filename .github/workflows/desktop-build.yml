name: Desktop Package Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows NSIS installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install JavaScript dependencies
        shell: pwsh
        run: |
          npm ci --legacy-peer-deps
          npm ci --prefix frontend --legacy-peer-deps
          npm install --prefix admin-frontend
          npm install --prefix desktop-tauri

      - name: Prepare Python backend environment
        shell: pwsh
        run: |
          py -3.12 -m venv backend\venv
          backend\venv\Scripts\python.exe -m pip install --upgrade pip
          backend\venv\Scripts\python.exe -m pip install -r backend\requirements.txt pyinstaller

      - name: Validate release version metadata
        run: npm run check:release-version

      - name: Sync desktop metadata
        run: node scripts/sync-desktop-meta.mjs

      - name: Build admin console
        run: npm run build:admin

      - name: Build desktop frontend
        run: npm run build:frontend

      - name: Build backend bundle
        shell: pwsh
        run: |
          Push-Location backend
          .\venv\Scripts\pyinstaller.exe openyak.spec --noconfirm
          Pop-Location

      - name: Verify backend bundle
        run: node scripts/verify-bundle.mjs backend/dist/openyak-backend

      - name: Download bundled Node.js runtime
        shell: pwsh
        run: backend\venv\Scripts\python.exe backend\scripts\download_node.py --output backend\resources\nodejs

      - name: Build Windows installer
        shell: pwsh
        run: |
          Push-Location desktop-tauri
          $tauriConfig = @{
            build = @{ beforeBuildCommand = "" }
            bundle = @{
              targets = @("nsis")
              createUpdaterArtifacts = $false
            }
          } | ConvertTo-Json -Compress -Depth 10
          Set-Content -Path "src-tauri\build.ci-windows.json" -Value $tauriConfig
          npx @tauri-apps/cli build --config src-tauri\build.ci-windows.json
          Pop-Location

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          if-no-files-found: error
          path: desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            target: aarch64-apple-darwin
            arch: arm64
            node_platform: Darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Install JavaScript dependencies
        run: |
          npm ci --legacy-peer-deps
          npm ci --prefix frontend --legacy-peer-deps
          npm install --prefix admin-frontend
          npm install --prefix desktop-tauri

      - name: Prepare Python backend environment
        run: |
          python3 -m venv backend/venv
          backend/venv/bin/python -m pip install --upgrade pip
          backend/venv/bin/python -m pip install -r backend/requirements.txt pyinstaller

      - name: Validate release version metadata
        run: npm run check:release-version

      - name: Sync desktop metadata
        run: node scripts/sync-desktop-meta.mjs

      - name: Disable local signing identity for CI artifacts
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = "desktop-tauri/src-tauri/tauri.conf.json";
          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          if (config.bundle?.macOS) delete config.bundle.macOS.signingIdentity;
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Build admin console
        run: npm run build:admin

      - name: Build desktop frontend
        run: npm run build:frontend

      - name: Build backend bundle
        run: |
          cd backend
          venv/bin/pyinstaller openyak.spec --noconfirm

      - name: Verify backend bundle
        run: node scripts/verify-bundle.mjs backend/dist/openyak-backend

      - name: Download bundled Node.js runtime
        run: backend/venv/bin/python backend/scripts/download_node.py --platform ${{ matrix.node_platform }} --output backend/resources/nodejs

      - name: Build macOS DMG
        run: |
          cd desktop-tauri
          npx @tauri-apps/cli build \
            --target ${{ matrix.target }} \
            --config '{"build":{"beforeBuildCommand":""},"bundle":{"targets":["dmg"],"createUpdaterArtifacts":false}}'

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-dmg
          if-no-files-found: error
          path: desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
