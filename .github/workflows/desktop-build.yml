name: Desktop Package Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows NSIS installer
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install JavaScript dependencies
        shell: pwsh
        run: |
          npm ci --legacy-peer-deps
          npm ci --prefix frontend --legacy-peer-deps
          npm install --prefix admin-frontend
          npm install --prefix desktop-tauri

      - name: Prepare Python backend environment
        shell: pwsh
        run: |
          py -3.12 -m venv backend\venv
          backend\venv\Scripts\python.exe -m pip install --upgrade pip
          backend\venv\Scripts\python.exe -m pip install -r backend\requirements.txt pyinstaller

      - name: Validate release version metadata
        run: npm run check:release-version

      - name: Sync desktop metadata
        run: node scripts/sync-desktop-meta.mjs

      - name: Build admin console
        run: npm run build:admin

      - name: Build desktop frontend
        run: npm run build:frontend

      - name: Build backend bundle
        shell: pwsh
        run: |
          Push-Location backend
          .\venv\Scripts\pyinstaller.exe openyak.spec --noconfirm
          Pop-Location

      - name: Verify backend bundle
        run: node scripts/verify-bundle.mjs backend/dist/openyak-backend

      - name: Download bundled Node.js runtime
        shell: pwsh
        run: backend\venv\Scripts\python.exe backend\scripts\download_node.py --output backend\resources\nodejs

      - name: Build Windows installer
        shell: pwsh
        run: |
          Push-Location desktop-tauri
          $tauriConfig = @{
            build = @{ beforeBuildCommand = "" }
            bundle = @{
              targets = @("nsis")
              createUpdaterArtifacts = $true
            }
          } | ConvertTo-Json -Compress -Depth 10
          Set-Content -Path "src-tauri\build.ci-windows.json" -Value $tauriConfig
          npx @tauri-apps/cli build --config src-tauri\build.ci-windows.json
          Pop-Location

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          if-no-files-found: error
          path: |
            desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
            desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe.sig

  build-macos:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            target: aarch64-apple-darwin
            arch: arm64
            node_platform: Darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Install JavaScript dependencies
        run: |
          npm ci --legacy-peer-deps
          npm ci --prefix frontend --legacy-peer-deps
          npm install --prefix admin-frontend
          npm install --prefix desktop-tauri

      - name: Prepare Python backend environment
        run: |
          python3 -m venv backend/venv
          backend/venv/bin/python -m pip install --upgrade pip
          backend/venv/bin/python -m pip install -r backend/requirements.txt pyinstaller

      - name: Validate release version metadata
        run: npm run check:release-version

      - name: Sync desktop metadata
        run: node scripts/sync-desktop-meta.mjs

      - name: Validate Apple signing secrets
        run: |
          set -euo pipefail
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID TAURI_SIGNING_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing GitHub Actions secrets required for a warning-free notarized macOS package: ${missing[*]}"
            exit 1
          fi

      - name: Install Apple certificate
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build admin console
        run: npm run build:admin

      - name: Build desktop frontend
        run: npm run build:frontend

      - name: Build backend bundle
        run: |
          cd backend
          venv/bin/pyinstaller openyak.spec --noconfirm

      - name: Verify backend bundle
        run: node scripts/verify-bundle.mjs backend/dist/openyak-backend

      - name: Download bundled Node.js runtime
        run: backend/venv/bin/python backend/scripts/download_node.py --platform ${{ matrix.node_platform }} --output backend/resources/nodejs

      - name: Build macOS DMG
        run: |
          cd desktop-tauri
          npx @tauri-apps/cli build \
            --target ${{ matrix.target }} \
            --config '{"build":{"beforeBuildCommand":""},"bundle":{"targets":["dmg","app"],"createUpdaterArtifacts":true}}'

      - name: Sign and verify app bundle
        run: |
          set -euo pipefail
          APP_NAME=$(node -e "const fs=require('node:fs'); const c=JSON.parse(fs.readFileSync('desktop-tauri/src-tauri/tauri.conf.json','utf8')); console.log(c.productName)")
          SIGNING_IDENTITY=$(node -e "const fs=require('node:fs'); const c=JSON.parse(fs.readFileSync('desktop-tauri/src-tauri/tauri.conf.json','utf8')); console.log(c.bundle.macOS.signingIdentity)")
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/${APP_NAME}.app"
          scripts/sign-macos-app.sh "$APP_PATH" "$SIGNING_IDENTITY"

      - name: Notarize and staple app
        run: |
          set -euo pipefail
          APP_NAME=$(node -e "const fs=require('node:fs'); const c=JSON.parse(fs.readFileSync('desktop-tauri/src-tauri/tauri.conf.json','utf8')); console.log(c.productName)")
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/${APP_NAME}.app"
          ZIP_PATH="$RUNNER_TEMP/${APP_NAME}-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl -a -vvv -t exec "$APP_PATH"

      - name: Verify backend inside signed app
        env:
          VERIFY_BUNDLE_SKIP_SMOKE: "1"
        run: |
          APP_NAME=$(node -e "const fs=require('node:fs'); const c=JSON.parse(fs.readFileSync('desktop-tauri/src-tauri/tauri.conf.json','utf8')); console.log(c.productName)")
          APP_BACKEND="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/${APP_NAME}.app/Contents/Resources/backend"
          node scripts/verify-bundle.mjs "$APP_BACKEND"

      - name: Regenerate notarized DMG and updater archive
        run: |
          set -euo pipefail
          APP_NAME=$(node -e "const fs=require('node:fs'); const c=JSON.parse(fs.readFileSync('desktop-tauri/src-tauri/tauri.conf.json','utf8')); console.log(c.productName)")
          SIGNING_IDENTITY=$(node -e "const fs=require('node:fs'); const c=JSON.parse(fs.readFileSync('desktop-tauri/src-tauri/tauri.conf.json','utf8')); console.log(c.bundle.macOS.signingIdentity)")
          BUNDLE_DIR="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION=$(node -p "require('./package.json').version")
          ARCH="${{ matrix.arch }}"
          TAR_NAME="${APP_NAME}_${VERSION}_${ARCH}.app.tar.gz"
          DMG_NAME="${APP_NAME}_${VERSION}_${ARCH}.dmg"

          cd "$BUNDLE_DIR/macos"
          rm -f "${APP_NAME}.app.tar.gz" "${APP_NAME}.app.tar.gz.sig" \
                "${APP_NAME}"_*.app.tar.gz "${APP_NAME}"_*.app.tar.gz.sig
          tar -czf "$TAR_NAME" "${APP_NAME}.app"
          cd "$GITHUB_WORKSPACE"
          npx @tauri-apps/cli signer sign "$BUNDLE_DIR/macos/$TAR_NAME"

          rm -f "$BUNDLE_DIR/dmg/"*.dmg
          DMG_STAGING=$(mktemp -d)
          cp -R "$BUNDLE_DIR/macos/${APP_NAME}.app" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create -volname "$APP_NAME" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            "$BUNDLE_DIR/dmg/$DMG_NAME"
          rm -rf "$DMG_STAGING"

          codesign --force --timestamp --sign "$SIGNING_IDENTITY" "$BUNDLE_DIR/dmg/$DMG_NAME"
          xcrun notarytool submit "$BUNDLE_DIR/dmg/$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$BUNDLE_DIR/dmg/$DMG_NAME"
          xcrun stapler validate "$BUNDLE_DIR/dmg/$DMG_NAME"
          spctl -a -vvv -t open --context context:primary-signature "$BUNDLE_DIR/dmg/$DMG_NAME"

      - name: Upload macOS DMG and updater archive
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-dmg
          if-no-files-found: error
          path: |
            desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
